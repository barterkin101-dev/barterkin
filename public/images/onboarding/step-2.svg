<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <rect width="200" height="160" fill="#f4f7f0" rx="16"/>

  <!-- Map/directory grid -->
  <!-- Card 1 -->
  <rect x="30" y="35" width="44" height="50" fill="#eef3e8" rx="8" stroke="#dfe8d5" stroke-width="1"/>
  <circle cx="52" cy="55" r="10" fill="#2d5a27" opacity="0.12"/>
  <circle cx="52" cy="53" r="4" fill="#2d5a27" opacity="0.3"/>
  <rect x="42" y="70" width="20" height="4" rx="2" fill="#dfe8d5"/>

  <!-- Card 2 -->
  <rect x="82" y="35" width="44" height="50" fill="#eef3e8" rx="8" stroke="#dfe8d5" stroke-width="1"/>
  <circle cx="104" cy="55" r="10" fill="#c4956a" opacity="0.15"/>
  <circle cx="104" cy="53" r="4" fill="#c4956a" opacity="0.4"/>
  <rect x="94" y="70" width="20" height="4" rx="2" fill="#dfe8d5"/>

  <!-- Card 3 -->
  <rect x="134" y="35" width="44" height="50" fill="#eef3e8" rx="8" stroke="#dfe8d5" stroke-width="1"/>
  <circle cx="156" cy="55" r="10" fill="#2d5a27" opacity="0.12"/>
  <circle cx="156" cy="53" r="4" fill="#2d5a27" opacity="0.3"/>
  <rect x="146" y="70" width="20" height="4" rx="2" fill="#dfe8d5"/>

  <!-- Bottom row card -->
  <rect x="56" y="95" width="88" height="40" fill="#eef3e8" rx="8" stroke="#dfe8d5" stroke-width="1"/>
  <circle cx="76" cy="115" r="10" fill="#c4956a" opacity="0.15"/>
  <circle cx="76" cy="113" r="4" fill="#c4956a" opacity="0.4"/>
  <rect x="94" y="110" width="36" height="4" rx="2" fill="#dfe8d5"/>
  <rect x="94" y="118" width="24" height="4" rx="2" fill="#dfe8d5" opacity="0.6"/>

  <!-- Search/magnifying glass -->
  <circle cx="155" cy="120" r="10" fill="none" stroke="#c4956a" stroke-width="2.5"/>
  <line x1="162" y1="127" x2="168" y2="133" stroke="#c4956a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Decorative leaf -->
  <path d="M25 80 Q20 70 18 65 Q22 68 25 75" fill="#3a7032" opacity="0.25"/>
</svg>