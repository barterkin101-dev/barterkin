<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="stemGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#2d5a27"/>
      <stop offset="100%" stop-color="#1e4420"/>
    </linearGradient>
    <linearGradient id="leafLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a7032"/>
      <stop offset="100%" stop-color="#2d5a27"/>
    </linearGradient>
    <linearGradient id="leafRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4956a"/>
      <stop offset="100%" stop-color="#a87b52"/>
    </linearGradient>
  </defs>

  <!-- Outer circle -->
  <circle cx="50" cy="50" r="46" fill="#f4f7f0" stroke="#dfe8d5" stroke-width="1.5"/>
  <circle cx="50" cy="50" r="42" fill="#eef3e8" opacity="0.5"/>

  <!-- Root/seed base -->
  <ellipse cx="50" cy="74" rx="8" ry="4" fill="#c4956a" opacity="0.3"/>

  <!-- Stem -->
  <path d="M50 74 Q50 55 50 42" stroke="url(#stemGrad)" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Left leaf (forest) -->
  <path d="M50 55 Q32 48 26 36 Q32 40 50 46" fill="url(#leafLeft)"/>
  <path d="M50 51 Q38 46 32 38" stroke="#2d5a27" stroke-width="0.8" fill="none" opacity="0.4"/>

  <!-- Right leaf (clay) -->
  <path d="M50 50 Q68 43 74 31 Q68 35 50 41" fill="url(#leafRight)"/>
  <path d="M50 46 Q62 41 68 33" stroke="#a87b52" stroke-width="0.8" fill="none" opacity="0.4"/>

  <!-- Center bud/heart -->
  <circle cx="50" cy="42" r="3.5" fill="#c4956a"/>
  <circle cx="50" cy="42" r="1.5" fill="#f4f7f0"/>
</svg>